<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeminiChat | Modern Messenger</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1e3f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        /* Layout Container */
        .app-container {
            width: 95vw;
            height: 90vh;
            max-width: 1200px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }

        .profile-section {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 45px; height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }

        .chat-item {
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .chat-item:hover { background: var(--glass); }
        .chat-item.active { background: var(--primary); }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .sent {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-right-radius: 4px;
        }

        .received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1247605845741495"
     crossorigin="anonymous"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="profile-section">
                <div class="avatar">JD</div>
                <div>
                    <h4>John Doe</h4>
                    <small style="color: #4ade80;">● Online</small>
                </div>
            </div>
            <div class="chat-list" id="chatList">
                <div class="chat-item active">
                    <span># General Room</span>
                </div>
                <div class="chat-item">
                    <span># Development</span>
                </div>
                <div class="chat-item">
                    <span># Design-Talk</span>
                </div>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <h3># General Room</h3>
                <span>38 Members</span>
            </header>

            <div class="messages-container" id="msgBox">
                <div class="message received">Hey! Have you seen the new UI for the chat app?</div>
                <div class="message sent">Looking slick! The glassmorphism effect is really cool.</div>
                <div class="message received">Agreed. It feels very 2026.</div>
            </div>

            <form class="input-area" id="chatForm">
                <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </main>
    </div>

    <script>
        const form = document.getElementById('chatForm');
        const input = document.getElementById('msgInput');
        const msgBox = document.getElementById('msgBox');

        // Function to add a message
        function addMessage(text, type = 'sent') {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', type);
            msgDiv.textContent = text;
            msgBox.appendChild(msgDiv);
            
            // Scroll to bottom
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        // Handle Form Submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim() === "") return;

            addMessage(input.value, 'sent');
            
            // Artificial "Bot" reply
            const userMsg = input.value.toLowerCase();
            input.value = "";

            setTimeout(() => {
                if(userMsg.includes("hello")) {
                    addMessage("Hey there! How can I help you today?", 'received');
                } else {
                    addMessage("That's interesting! Tell me more.", 'received');
                }
            }, 1000);
        });
    </script>
</body>
</html>
